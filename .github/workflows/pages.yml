name: Deploy to GitHub Pages

# Pages 的發布來源是 gh-pages 分支(推 gh-pages 分支時 GitHub 會自動建置部署)。
# 這個工作流程的職責:每次 push main,就把 main 完整鏡像到 gh-pages。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mirror main to gh-pages
        run: git push origin HEAD:gh-pages --force
