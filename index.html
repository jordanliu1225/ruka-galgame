<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Galgame</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="game">

  <!-- 標題畫面 -->
  <div id="title-screen" class="screen">
    <h1 id="game-title">…</h1>
    <p class="subtitle" id="game-subtitle"></p>
    <div class="menu">
      <button id="btn-start">開始遊戲</button>
      <button id="btn-load-title">讀取進度</button>
    </div>
    <p class="version">web galgame engine v0.1 · 示範版</p>
  </div>

  <!-- 遊戲畫面 -->
  <div id="play-screen" class="screen hidden">
    <div id="bg-layer" data-tag=""></div>
    <div id="char-layer">
      <div class="char-slot" id="slot-left"></div>
      <div class="char-slot" id="slot-center"></div>
      <div class="char-slot" id="slot-right"></div>
    </div>
    <div id="ui-layer">
      <div id="quick-menu">
        <button data-act="auto">AUTO</button>
        <button data-act="skip">快轉</button>
        <button data-act="log">紀錄</button>
        <button data-act="save">存檔</button>
        <button data-act="load">讀檔</button>
        <button data-act="title">標題</button>
      </div>
      <div id="affection-hud"></div>
      <div id="dialogue-box">
        <div id="name-plate" class="hidden"></div>
        <div id="dialogue-text"></div>
        <div id="advance-hint" class="hidden">▼</div>
      </div>
      <div id="choice-box" class="hidden"></div>
    </div>
  </div>

  <!-- 對話紀錄 -->
  <div id="backlog" class="overlay hidden">
    <div class="panel">
      <h2>對話紀錄</h2>
      <div id="backlog-list"></div>
      <button class="close-btn">關閉</button>
    </div>
  </div>

  <!-- 存檔/讀檔 -->
  <div id="saveload" class="overlay hidden">
    <div class="panel">
      <h2 id="saveload-title">存檔</h2>
      <div id="slot-list"></div>
      <button class="close-btn">關閉</button>
    </div>
  </div>

  <!-- 結局畫面 -->
  <div id="ending-screen" class="overlay hidden">
    <div id="ending-title"></div>
    <div id="ending-desc"></div>
    <button id="btn-ending-title">回到標題</button>
  </div>

  <div id="toast"></div>
</div>
<script src="js/script.js"></script>
<script src="js/engine.js"></script>
</body>
</html>
